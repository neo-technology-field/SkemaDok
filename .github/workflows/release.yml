name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Cache npm packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('app/src/main/frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Derive release version from tag
        id: version
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set Maven version
        run: mvn --batch-mode versions:set -DnewVersion=${{ steps.version.outputs.RELEASE_VERSION }} -DgenerateBackupPoms=false

      - name: Build
        run: mvn --batch-mode package -DskipTests

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            collector/target/skemadok-collector-${{ steps.version.outputs.RELEASE_VERSION }}.jar
            app/target/skemadok-${{ steps.version.outputs.RELEASE_VERSION }}.jar
